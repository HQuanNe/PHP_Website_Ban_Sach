<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dream book</title>

    <link rel="icon" href="#">
    <link rel="stylesheet" href="/CSS/index.css">
    <link rel="stylesheet" href="/CSS/default.css">
    <link rel="stylesheet" href="/Resource/FontAwesome/fontawesome-free-7.2.0-web/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="container-header">
            <div class="container-header-top">
                <h2>Hiển thị banner quảng bá ở đây</h2>
            </div>
            <div class="container-header-mid">
                <div class="header-mid-logo"><h2>Logo</h2></div>
                <div class="header-mid-search_bar">
                    <input type="text" name="header-mid-search" id="">
                    <button><i class="fa-solid fa-magnifying-glass"></i></button>
                </div>
                <div class="header-mid-cart"><i class="fa-solid fa-cart-shopping"></i></div>
                <div class="header-mid-account">
                    <span><i class="fa-regular fa-user"></i></span>
                    <span class="header-mid-account-login"><a href="#">Đăng nhập</a></span>
                    <span class="header-mid-account-register"><a href="#">Đăng ký</a></span>
                </div>
            </div>
            <div class="container-header-bottom">
                <div class="header-bottom-category">
                    <span><i class="fa-solid fa-bars"></i></span>
                    <span>TẤT CẢ DANH MỤC</span>
                </div>
                <div class="header-bottom-navbar">
                    <ul>
                        <li>Trang chủ</li>
                        <li>Giới thiệu</li>
                        <li>Tin tức</li>
                        <li>Tra cứu đơn</li>
                        <li>Liên hệ</li>
                    </ul>
                </div>
            </div>
        </div>
        <div class="container-main"></div>
    </div>
</body>
</html>
